<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documentation - HF-Digital Twin Platform</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            line-height: 1.6;
            color: #2E2E2E;
            background: #F4F7F9;
            padding: 2rem;
        }
        .container {
            overflow-x: auto;
            word-wrap: break-word;
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            padding: 3rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 { color: #0B3C5D; border-bottom: 3px solid #1FA2A6; padding-bottom: 1rem; margin-bottom: 2rem; }
        h2 { color: #0B3C5D; margin-top: 2rem; margin-bottom: 1rem; padding-top: 1rem; border-top: 2px solid #F4F7F9; }
        h3 { color: #1FA2A6; margin-top: 1.5rem; margin-bottom: 0.5rem; }
        code { background: #F4F7F9; padding: 0.2rem 0.4rem; border-radius: 4px; font-family: monospace; color: #D9534F; }
        pre { background: #2E2E2E; color: #F4F7F9; padding: 1rem; border-radius: 6px; overflow-x: auto; margin: 1rem 0; }
        pre code {
            white-space: pre-wrap;
            word-wrap: break-word; background: transparent; color: inherit; padding: 0; }
        table { width: 100%; border-collapse: collapse; margin: 1rem 0; }
        th, td { padding: 0.75rem; text-align: left; border-bottom: 1px solid #F4F7F9; }
        th { background: #0B3C5D; color: white; font-weight: 600; }
        tr:hover { background: #F4F7F9; }
        ul, ol { margin-left: 2rem; margin-bottom: 1rem; }
        a { color: #1FA2A6; text-decoration: none; }
        a:hover { text-decoration: underline; }
        #content { margin-top: 2rem; }
    </style>
</head>
<body>
    <div class="container">
        <div id="content"></div>
    </div>
    <script>
        fetch('HTML_EOF
  echo "${file}")
  cat >> "${name}.html" << 'HTML_EOF'
')
            .then(response => response.text())
            .then(text => {
                document.getElementById('content').innerHTML = marked.parse(text);
            })
            .catch(err => {
                document.getElementById('content').innerHTML = '<p>Error loading documentation. Please try again later.</p>';
            });
    </script>
</body>
</html>
