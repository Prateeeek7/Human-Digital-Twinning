version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MODEL_DEVICE=cpu
      - API_HOST=0.0.0.0
      - API_PORT=8000
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    restart: unless-stopped

  # Optional: Add Redis for caching
  # redis:
  #   image: redis:alpine
  #   ports:
  #     - "6379:6379"



